name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nucleo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nucleo_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/nucleo_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nucleo_test
      AUTH_SECRET: ci-secret-no-productivo-1234567890abcdef

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Migrar la base de test
        run: npx prisma migrate deploy

      - name: Verify (type-check + lint + tests)
        run: npm run verify
